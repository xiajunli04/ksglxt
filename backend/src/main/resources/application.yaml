spring:
  application:
    name: backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ksglxt?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true
    username: root
    password: 123456
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init.sql
      encoding: UTF-8
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 0
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1s
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
  cache:
    type: redis
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.xjl.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8001

jwt:
  secret: ksglxt-classroom-booking-system-jwt-secret-key-2024-must-be-at-least-256-bits-long
  expiration: 7200000
  header: Authorization
  prefix: "Bearer "

file:
  upload-dir: C:/Users/leehua/Desktop/workplace/ksglxt/backend/uploads

